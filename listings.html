<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Products — ReUse Market</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">ReUse<span>Market</span></a>
  <div class="nav-search">
    <button><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
    <input id="nav-search-input" type="text" placeholder="Search products..." onkeydown="if(event.key==='Enter') applySearch()">
  </div>
  <div class="nav-actions">
    <div id="nav-auth-btns" style="display:flex;gap:8px">
      <a href="/login.html" class="btn btn-outline btn-sm">Login</a>
      <a href="/register.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
    <div id="nav-user-menu" style="display:none;align-items:center;gap:6px">
      <a href="/post-ad.html" id="nav-post-btn" class="btn btn-primary btn-sm" style="display:none">+ Sell</a>
      <a href="/chat.html" class="nav-icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span id="unread-badge" class="badge" style="display:none">0</span></a>
      <a href="/dashboard.html" class="nav-icon-btn"><div id="nav-avatar" style="width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">U</div></a>
    </div>
  </div>
</nav>

<main class="main">
  <div class="container page">
    <div class="listing-layout">
      <!-- FILTER SIDEBAR -->
      <aside class="filter-sidebar">
        <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:20px">Filters</div>

        <div class="filter-group">
          <div class="filter-label">Category</div>
          <div id="category-filters"></div>
        </div>

        <div class="filter-group">
          <div class="filter-label">Price Range</div>
          <div class="price-inputs">
            <input class="price-input" id="min-price" type="number" placeholder="Min ₹" min="0">
            <span style="color:var(--text-muted)">—</span>
            <input class="price-input" id="max-price" type="number" placeholder="Max ₹" min="0">
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-label">Condition</div>
          <label class="filter-option"><input type="checkbox" value="Excellent" onchange="applyFilters()"> Excellent</label>
          <label class="filter-option"><input type="checkbox" value="Good" onchange="applyFilters()"> Good</label>
          <label class="filter-option"><input type="checkbox" value="Fair" onchange="applyFilters()"> Fair</label>
          <label class="filter-option"><input type="checkbox" value="Poor" onchange="applyFilters()"> Poor</label>
        </div>

        <div class="filter-group">
          <div class="filter-label">Location</div>
          <input class="price-input" id="location-filter" type="text" placeholder="Enter city..." style="width:100%" onkeydown="if(event.key==='Enter') applyFilters()">
        </div>

        <button class="btn btn-primary btn-block" onclick="applyFilters()">Apply Filters</button>
        <button class="btn btn-ghost btn-block mt-1" onclick="clearFilters()">Clear All</button>
      </aside>

      <!-- PRODUCTS -->
      <div>
        <div class="products-header">
          <div>
            <div id="page-heading" class="page-title" style="margin-bottom:4px">All Products</div>
            <div class="products-count" id="product-count">Loading...</div>
          </div>
          <select class="sort-select" id="sort-select" onchange="applyFilters()">
            <option value="newest">Newest First</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="popular">Most Viewed</option>
          </select>
        </div>

        <div class="product-grid" id="product-grid">
          <div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>

        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</main>

<script src="/static/js/main.js"></script>
<script>
const CATEGORIES = ['Electronics','Furniture','Clothing','Books','Vehicles','Sports','Home & Garden','Toys','Music','Other'];
let currentPage = 1;
let params = {};

function initFromURL() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('search')) {
    params.search = p.get('search');
    document.getElementById('nav-search-input').value = params.search;
    document.getElementById('page-heading').textContent = `Results for "${params.search}"`;
  }
  if (p.get('category')) {
    params.category = p.get('category');
    document.getElementById('page-heading').textContent = params.category;
  }
}

function renderCategoryFilters() {
  const container = document.getElementById('category-filters');
  container.innerHTML = CATEGORIES.map(c => `
    <label class="filter-option">
      <input type="radio" name="cat-filter" value="${c}" ${params.category === c ? 'checked' : ''} onchange="params.category=this.value;loadProducts()">
      ${Utils.categoryIcon[c]} ${c}
    </label>`).join('') + `
    <label class="filter-option">
      <input type="radio" name="cat-filter" value="" ${!params.category ? 'checked' : ''} onchange="params.category='';loadProducts()">
      All
    </label>`;
}

function applySearch() {
  const q = document.getElementById('nav-search-input').value.trim();
  params.search = q;
  loadProducts(1);
}

function applyFilters() {
  params.min_price = document.getElementById('min-price').value;
  params.max_price = document.getElementById('max-price').value;
  params.location = document.getElementById('location-filter').value.trim();
  params.sort = document.getElementById('sort-select').value;
  const catInput = document.querySelector('input[name="cat-filter"]:checked');
  if (catInput) params.category = catInput.value;
  loadProducts(1);
}

function clearFilters() {
  params = {};
  document.getElementById('nav-search-input').value = '';
  document.getElementById('min-price').value = '';
  document.getElementById('max-price').value = '';
  document.getElementById('location-filter').value = '';
  document.querySelectorAll('input[name="cat-filter"]').forEach(r => r.checked = r.value === '');
  loadProducts(1);
}

async function loadProducts(page = currentPage) {
  currentPage = page;
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '<div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div>';

  const queryParams = new URLSearchParams({ page, per_page: 12, ...params });
  Object.keys(params).forEach(k => { if (!params[k]) queryParams.delete(k); });

  try {
    const data = await API.get('/api/products?' + queryParams.toString());
    const countEl = document.getElementById('product-count');
    countEl.textContent = `${data.total} products found`;

    if (data.products.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🔍</div><h3>No products found</h3>
        <p>Try different search terms or filters</p>
        <button class="btn btn-outline mt-2" onclick="clearFilters()">Clear Filters</button>
      </div>`;
    } else {
      grid.innerHTML = data.products.map(p => renderProductCard(p)).join('');
    }
    renderPagination(data.pages, data.current_page);
  } catch (e) {
    grid.innerHTML = '<p style="padding:24px;color:var(--text-muted);grid-column:1/-1">Failed to load products. Please try again.</p>';
  }
}

function renderPagination(totalPages, current) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  if (current > 1) html += `<button class="page-btn" onclick="loadProducts(${current-1})">‹</button>`;
  for (let i = Math.max(1, current-2); i <= Math.min(totalPages, current+2); i++) {
    html += `<button class="page-btn ${i===current?'active':''}" onclick="loadProducts(${i})">${i}</button>`;
  }
  if (current < totalPages) html += `<button class="page-btn" onclick="loadProducts(${current+1})">›</button>`;
  el.innerHTML = html;
}

initFromURL();
renderCategoryFilters();
loadProducts();
</script>
</body>
</html>
