<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ReUse Market</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">ReUse<span>Market</span></a>
  <div class="nav-actions">
    <a href="/login.html" class="btn btn-outline btn-sm">Login</a>
    <a href="/register.html" class="btn btn-primary btn-sm">Sign Up</a>
  </div>
</nav>

<main class="main">
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-illustration">🌱</div>
      <h2>Join ReUse Market</h2>
      <p>Thousands of people already buy and sell second-hand items on our platform. Join the sustainable marketplace today!</p>
      <div style="margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:300px">
        <div style="background:rgba(255,255,255,0.1);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:1.6rem;margin-bottom:4px">♻️</div>
          <div style="color:#fff;font-size:12px;font-weight:600">Sustainable</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:1.6rem;margin-bottom:4px">💰</div>
          <div style="color:#fff;font-size:12px;font-weight:600">Save Money</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:1.6rem;margin-bottom:4px">🔒</div>
          <div style="color:#fff;font-size:12px;font-weight:600">Secure</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:1.6rem;margin-bottom:4px">🆓</div>
          <div style="color:#fff;font-size:12px;font-weight:600">Always Free</div>
        </div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-wrap">
        <h2>Create Account</h2>
        <p>Already have an account? <a href="/login.html">Sign in</a></p>
        <form id="register-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" type="text" id="name" placeholder="Your name" required autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">Phone (optional)</label>
              <input class="form-input" type="tel" id="phone" placeholder="+91 XXXXX XXXXX">
            </div>
            <div class="form-group">
              <label class="form-label">City (optional)</label>
              <input class="form-input" type="text" id="location" placeholder="Mumbai">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div style="position:relative">
              <input class="form-input" type="password" id="password" placeholder="Min 6 characters" required autocomplete="new-password">
              <button type="button" onclick="togglePwd('password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input class="form-input" type="password" id="confirm-password" placeholder="Repeat password" required>
          </div>
          <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:16px;font-size:13px;color:var(--text-muted)">
            <input type="checkbox" id="agree-terms" required style="margin-top:2px;accent-color:var(--primary)">
            <label for="agree-terms">I agree to the <a href="#" style="color:var(--primary)">Terms of Service</a> and <a href="#" style="color:var(--primary)">Privacy Policy</a></label>
          </div>
          <div id="register-error" class="form-error" style="margin-bottom:12px;display:none"></div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">Create Account</button>
        </form>
        <div class="auth-toggle">Already have an account? <a href="/login.html">Sign in</a></div>
      </div>
    </div>
  </div>
</main>

<script src="/static/js/main.js"></script>
<script>
function togglePwd(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  const errEl = document.getElementById('register-error');
  const pwd = document.getElementById('password').value;
  const confirmPwd = document.getElementById('confirm-password').value;

  if (pwd !== confirmPwd) {
    errEl.textContent = 'Passwords do not match';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';
  errEl.style.display = 'none';

  try {
    await API.post('/api/register', {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: pwd,
      phone: document.getElementById('phone').value,
      location: document.getElementById('location').value
    });
    Toast.success('Account created! Welcome to ReUse Market!');
    setTimeout(() => window.location.href = '/dashboard.html', 1000);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
