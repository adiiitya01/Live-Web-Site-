<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details — ReUse Market</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">ReUse<span>Market</span></a>
  <div class="nav-search"><button><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button><input type="text" placeholder="Search..."></div>
  <div class="nav-actions">
    <div id="nav-auth-btns" style="display:flex;gap:8px"><a href="/login.html" class="btn btn-outline btn-sm">Login</a><a href="/register.html" class="btn btn-primary btn-sm">Sign Up</a></div>
    <div id="nav-user-menu" style="display:none;align-items:center;gap:6px">
      <a href="/post-ad.html" id="nav-post-btn" class="btn btn-primary btn-sm" style="display:none">+ Sell</a>
      <a href="/chat.html" class="nav-icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span id="unread-badge" class="badge" style="display:none">0</span></a>
      <a href="/dashboard.html" class="nav-icon-btn"><div id="nav-avatar" style="width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">U</div></a>
    </div>
  </div>
</nav>

<main class="main">
  <div class="container product-detail">
    <!-- Breadcrumb -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:var(--text-muted)">
      <a href="/" style="color:var(--text-muted);text-decoration:none">Home</a> › 
      <a href="/listings.html" style="color:var(--text-muted);text-decoration:none" id="breadcrumb-category">Products</a> › 
      <span id="breadcrumb-title" style="color:var(--text)">Loading...</span>
    </div>

    <div id="product-loader" class="loader"><div class="spinner"></div></div>
    <div id="product-content" class="detail-grid" style="display:none"></div>

    <!-- Related Products -->
    <div style="margin-top:48px">
      <div class="section-title">Similar Products</div>
      <div class="product-grid" id="related-grid"></div>
    </div>
  </div>
</main>

<!-- Report Modal -->
<div id="report-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>Report this listing</h3>
    <p>Help us keep the marketplace safe by reporting suspicious or inappropriate content.</p>
    <div class="form-group">
      <label class="form-label">Reason</label>
      <select class="form-select" id="report-reason">
        <option>Fake or scam listing</option>
        <option>Prohibited item</option>
        <option>Wrong category</option>
        <option>Offensive content</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Additional details (optional)</label>
      <textarea class="form-textarea" id="report-description" placeholder="Tell us more..." rows="3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('report-modal').style.display='none'">Cancel</button>
      <button class="btn btn-danger" onclick="submitReport()">Submit Report</button>
    </div>
  </div>
</div>

<script src="/static/js/main.js"></script>
<script>
let productId = Utils.getParam('id');
let product = null;
let currentImg = 0;

async function loadProduct() {
  if (!productId) { window.location.href = '/listings.html'; return; }
  try {
    const data = await API.get(`/api/products/${productId}`);
    product = data.product;
    renderProduct(product, data.product.in_wishlist);
    loadRelated(product.category);
  } catch (e) {
    document.getElementById('product-loader').innerHTML = '<div class="empty-state"><div class="icon">😕</div><h3>Product not found</h3><p>This listing may have been removed.</p><a href="/listings.html" class="btn btn-primary mt-2">Browse Products</a></div>';
  }
}

function renderProduct(p, inWishlist) {
  document.title = p.title + ' — ReUse Market';
  document.getElementById('breadcrumb-category').textContent = p.category;
  document.getElementById('breadcrumb-category').href = `/listings.html?category=${encodeURIComponent(p.category)}`;
  document.getElementById('breadcrumb-title').textContent = Utils.truncate(p.title, 40);

  const images = p.images && p.images.length > 0 ? p.images : ['default.jpg'];
  const mainImgSrc = (img) => img.startsWith('http') ? img : `/uploads/${img}`;
  const sellerInitial = p.seller ? p.seller.name.charAt(0).toUpperCase() : '?';
  const isOwner = App.user && App.user.id === p.user_id;
  const isSold = !p.is_available;

  const thumbs = images.map((img, i) => `
    <div class="thumb ${i===0?'active':''}" onclick="setImage(${i})" id="thumb-${i}">
      <img src="${mainImgSrc(img)}" alt="">
    </div>`).join('');

  const actionBtns = isOwner
    ? `<a href="/dashboard.html" class="btn btn-outline" style="flex:1">Manage Listing</a>`
    : isSold
    ? `<button class="btn btn-ghost" style="flex:1" disabled>This item is sold</button>`
    : `<button class="btn btn-primary" style="flex:1" onclick="startChat(${p.user_id}, ${p.id})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chat with Seller
       </button>`;

  document.getElementById('product-content').innerHTML = `
    <div class="detail-images">
      <div class="main-img" id="main-img-wrap">
        <img id="main-img" src="${mainImgSrc(images[0])}" alt="${Utils.escapeHtml(p.title)}" style="width:100%;height:100%;object-fit:cover">
      </div>
      ${images.length > 1 ? `<div class="thumb-strip">${thumbs}</div>` : ''}
    </div>
    <div>
      <div class="detail-info-card">
        ${isSold ? '<div style="background:#f0f0f0;border-radius:8px;padding:8px;text-align:center;font-size:12px;font-weight:700;color:#636e72;letter-spacing:1px;margin-bottom:12px">SOLD</div>' : ''}
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <h1 class="detail-title">${Utils.escapeHtml(p.title)}</h1>
          <button class="wishlist-btn ${inWishlist?'active':''}" style="position:static;width:36px;height:36px;flex-shrink:0;border:1.5px solid var(--border);border-radius:50%" 
            onclick="toggleWishlist(this, ${p.id})">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="${inWishlist?'currentColor':'none'}" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>
        <div class="detail-price">${Utils.formatPrice(p.price)}</div>
        <div class="detail-tags">
          <span class="tag">📦 ${Utils.escapeHtml(p.category)}</span>
          <span class="tag ${Utils.conditionClass[p.condition] || ''}">★ ${Utils.escapeHtml(p.condition)}</span>
          <span class="tag">📍 ${Utils.escapeHtml(p.location)}</span>
          <span class="tag">👁 ${p.views} views</span>
        </div>
        
        <div class="divider"></div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text-muted)">DESCRIPTION</div>
        <p style="font-size:14px;line-height:1.7;color:var(--text)">${Utils.escapeHtml(p.description)}</p>
        <div class="divider"></div>

        <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-muted)">SELLER</div>
        <div class="seller-card" onclick="viewSeller(${p.user_id})">
          <div class="seller-avatar">${sellerInitial}</div>
          <div>
            <div class="seller-name">${Utils.escapeHtml(p.seller?.name || 'Unknown')}</div>
            <div class="seller-meta">Member since ${new Date(p.seller?.created_at || Date.now()).getFullYear()} · ${Utils.formatDate(p.created_at)}</div>
          </div>
          <svg style="margin-left:auto;color:var(--text-muted)" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>

        <div class="detail-actions">
          ${actionBtns}
        </div>

        <div style="text-align:center;margin-top:12px">
          <button onclick="document.getElementById('report-modal').style.display='flex'" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:12px;text-decoration:underline">
            Report this listing
          </button>
        </div>
      </div>
      <div style="margin-top:12px;background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:16px;font-size:13px;color:var(--text-muted)">
        <strong style="color:var(--text);display:block;margin-bottom:6px">🛡 Safety Tips</strong>
        Meet in a public place · Don't pay in advance · Inspect before buying · Trust your instincts
      </div>
    </div>`;

  document.getElementById('product-loader').style.display = 'none';
  document.getElementById('product-content').style.display = 'grid';

  // Image thumbnails click
  window.setImage = (idx) => {
    currentImg = idx;
    const imgs = p.images && p.images.length > 0 ? p.images : ['default.jpg'];
    document.getElementById('main-img').src = mainImgSrc(imgs[idx]);
    document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
  };
}

async function startChat(sellerId, productId) {
  if (!App.requireAuth()) return;
  window.location.href = `/chat.html?user=${sellerId}&product=${productId}`;
}

function viewSeller(userId) {
  window.location.href = `/listings.html?seller=${userId}`;
}

async function submitReport() {
  if (!App.requireAuth()) return;
  const reason = document.getElementById('report-reason').value;
  const description = document.getElementById('report-description').value;
  try {
    await API.post(`/api/products/${productId}/report`, { reason, description });
    document.getElementById('report-modal').style.display = 'none';
    Toast.success('Report submitted. Thank you!');
  } catch (e) {
    Toast.error(e.message);
  }
}

async function loadRelated(category) {
  try {
    const data = await API.get(`/api/products?category=${encodeURIComponent(category)}&per_page=4`);
    const related = data.products.filter(p => p.id != productId).slice(0, 4);
    const grid = document.getElementById('related-grid');
    if (related.length > 0) {
      grid.innerHTML = related.map(p => renderProductCard(p)).join('');
    } else {
      grid.innerHTML = '';
      grid.parentElement.style.display = 'none';
    }
  } catch (e) {}
}

loadProduct();
</script>
</body>
</html>
